services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    networks: [bookstore-net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    networks: [bookstore-net]

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222" # NATS client (pub/sub)
      - "8222:8222" # HTTP monitoring
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 128m
    networks: [bookstore-net]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # 웹 UI / REST API
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 64m
    networks: [bookstore-net]

  # S3 호환 오브젝트 스토리지 - 포토 리뷰 이미지 저장
  seaweedfs:
    image: chrislusf/seaweedfs:4.39
    # -s3.port을 명시하지 않으면 SeaweedFS는 S3 API를 9000이 아닌 8333에 바인딩한다(실제로 붙여보고 확인함) -
    # MinIO 관례(9000)와 이 프로젝트 나머지 설정(app.storage.*, 아래 ports)을 맞추기 위해 명시적으로 지정.
    command: ["server", "-dir=/data", "-filer", "-s3", "-s3.port=9000", "-s3.config=/etc/seaweedfs/s3-identities.json"]
    volumes:
      - ./docker/seaweedfs/s3-identities.json:/etc/seaweedfs/s3-identities.json:ro
      - seaweedfsdata:/data
    ports:
      - "9000:9000" # S3 API
      - "8888:8888" # filer HTTP - 로컬 확인용(브라우저로 http://localhost:8888/buckets/review-images/ 탐색, docs/REVIEW_IMAGE.md 참고)
    # localhost는 컨테이너 /etc/hosts에서 ::1(IPv6)이 127.0.0.1보다 먼저 오는데 SeaweedFS는 IPv4만 바인딩해서
    # wget이 IPv6로 먼저 붙었다 실패한다(실제로 붙여보고 확인함) - 127.0.0.1을 명시해서 우회.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9333/cluster/status"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    networks: [bookstore-net]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookstore
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_NATS_ENABLED: "true"
      APP_NATS_URL: nats://nats:4222
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      APP_STORAGE_ENDPOINT: http://seaweedfs:9000
      APP_STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      APP_STORAGE_ACCESS_KEY: bookstore-local-dev-access-key
      APP_STORAGE_SECRET_KEY: bookstore-local-dev-secret-key-not-for-prod
      APP_STORAGE_BUCKET: review-images
      APP_STORAGE_ORPHAN_CLEANUP_ENABLED: "true"
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET is not set - copy .env.example to .env and fill it in}
      APP_KAKAO_REST_API_KEY: ${APP_KAKAO_REST_API_KEY:-}
      APP_BOOK_SEED_ENABLED: "true"
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      replicas: 2
    mem_limit: 512m
    networks: [bookstore-net]

  nginx:
    image: nginx:1.30-alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/swagger-ui/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 64m
    networks: [bookstore-net]

networks:
  bookstore-net:
    driver: bridge

volumes:
  pgdata:
  natsdata:
  seaweedfsdata:
