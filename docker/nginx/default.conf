# Docker Compose's embedded DNS (127.0.0.11) returns both `app` replica IPs,
# but a plain `server app:8080;` line resolves the name only once, at nginx
# startup, and keeps whatever it got forever - it never re-checks as replicas
# come and go. The `resolve` parameter (open source since nginx 1.27.3; we run
# 1.30) tells nginx to re-resolve `app` via the `resolver` below on every TTL
# expiry, so the upstream peer list stays in sync with the actual containers.
upstream bookstore_app {
    zone bookstore_app 64k;
    resolver 127.0.0.11 valid=10s ipv6=off;
    server app:8080 resolve;
}

server {
    listen 80;

    location /actuator/ {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://bookstore_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Upstream-Addr $upstream_addr always;
    }
}
