spring.application.name=bookstore
server.port=8080

# Datasource - local dev defaults (docker-compose overrides via SPRING_DATASOURCE_* env vars)
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore
spring.datasource.username=bookstore
spring.datasource.password=bookstore

# JPA / Hibernate - Flyway owns the schema; Hibernate only validates, never auto-generates DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway - reuses spring.datasource.* above
spring.flyway.enabled=true

# Redis - local dev defaults (docker-compose overrides via SPRING_DATA_REDIS_* env vars)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# NATS - custom property, no Spring Boot auto-configuration exists for this client
app.nats.url=nats://localhost:4222

# Actuator - expose ONLY health, never leak component details publicly
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
