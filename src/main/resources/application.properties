spring.application.name=bookstore
server.port=8080

# Datasource - local dev defaults (docker-compose overrides via SPRING_DATASOURCE_* env vars)
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore
spring.datasource.username=bookstore
spring.datasource.password=bookstore

# JPA / Hibernate - Flyway owns the schema; Hibernate only validates, never auto-generates DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway - reuses spring.datasource.* above
spring.flyway.enabled=true

# Redis - local dev defaults (docker-compose overrides via SPRING_DATA_REDIS_* env vars)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# NATS - custom property, no Spring Boot auto-configuration exists for this client
app.nats.url=nats://localhost:4222

# JWT - this is an obviously-fake placeholder, safe to commit. Any real environment (docker-compose, CI, prod)
# MUST override it via the APP_JWT_SECRET env var (see .env.example) - a real key must never be committed here.
app.jwt.secret=bG9jYWwtZGV2LXBsYWNlaG9sZGVyLWRvLW5vdC11c2UtaW4tcHJvZHVjdGlvbiEh
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=1209600000

# Actuator - expose ONLY health, never leak component details publicly
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Kakao Book Search API - one-time catalog seeding only, never a live proxy (see docs/ERD.md
# "도서 카탈로그 모듈" for why). Disabled by default so plain local runs/tests never call the real
# API; docker-compose enables it explicitly via APP_BOOK_SEED_ENABLED and supplies a real key via
# APP_KAKAO_REST_API_KEY. A missing/invalid key just makes seeding fail gracefully at startup.
app.kakao.rest-api-key=
app.book-seed.enabled=false
