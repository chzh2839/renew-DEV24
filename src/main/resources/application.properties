spring.application.name=bookstore
server.port=8080

# 데이터소스 - 로컬 개발 기본값(docker-compose에서는 SPRING_DATASOURCE_* 환경변수로 덮어씀)
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore
spring.datasource.username=bookstore
spring.datasource.password=bookstore

# JPA / Hibernate - 스키마는 Flyway가 소유하고, Hibernate는 검증만 할 뿐 DDL을 자동 생성하지 않는다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway - 위 spring.datasource.* 설정을 그대로 사용
spring.flyway.enabled=true

# Redis - 로컬 개발 기본값(docker-compose에서는 SPRING_DATA_REDIS_* 환경변수로 덮어씀)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Redis 캐시 통계 수집 - 기본값 false라 켜두지 않으면 RedisCacheMeterBinderProvider가 cache_gets_total 메트릭
# "모양"은 등록해도 값은 항상 0으로 고정된다(RedisCacheWriter의 통계 수집기가 no-op으로 남기 때문).
# bookSearch/bookDetail 캐시 히트/미스를 /actuator/prometheus로 실제로 보려면 반드시 켜야 한다(docs/OBSERVABILITY.md 참고).
spring.cache.redis.enable-statistics=true

# NATS - Spring Boot 자동설정이 없는 커스텀 클라이언트라 직접 정의한 프로퍼티.
# 기본은 꺼둬서(false)(app.book-seed.enabled와 동일한 패턴) NATS 서버가 없는 일반 로컬 실행/테스트는 기동 시 연결을 시도하지 않는다.
# docker-compose와 NATS 관련 테스트에서만 명시적으로 켠다.
#
# 참고: @ConditionalOnProperty는 기본값이 matchIfMissing=false라 이 줄 자체를 생략해도 동작(꺼짐)은 동일하다.
# 그런데도 명시해두는 이유는 순전히 가시성(discoverability) 때문 - 이 플래그가 존재하고 기본이 꺼져 있다는 걸
# 파일만 보고도 알 수 있게 하기 위함(바로 아래 app.book-seed.enabled와 같은 이유).
app.nats.enabled=false
app.nats.url=nats://localhost:4222

# 메일 - 로컬 개발 기본값(docker-compose에서는 SPRING_MAIL_* 환경변수로 Mailpit을 가리키도록 덮어씀).
# JavaMailSenderImpl은 필드만 설정하는 순수 POJO라 여기 설정만으로는 아무 연결도 시도하지 않는다
# - NATS와 달리 별도 온오프 플래그가 필요 없다(자세한 이유는 docs/NATS.md 참고).
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT - 누가 봐도 가짜인 플레이스홀더라 커밋해도 안전하다. 실제 환경(docker-compose, CI, 운영)은 반드시
# APP_JWT_SECRET 환경변수로 덮어써야 한다(.env.example 참고) - 진짜 키는 절대 여기에 커밋하면 안 된다.
app.jwt.secret=bG9jYWwtZGV2LXBsYWNlaG9sZGVyLWRvLW5vdC11c2UtaW4tcHJvZHVjdGlvbiEh
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=1209600000

# Actuator - health/metrics/prometheus만 노출하고, 컴포넌트 상세 정보는 절대 외부에 노출하지 않는다.
# 외부 차단은 nginx(/actuator/ 전체 deny)가, 내부 노출 범위는 이 allowlist가 담당하는 이중 차단 구조다(docs/OBSERVABILITY.md 참고).
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=never

# 카카오 도서 검색 API - 카탈로그 시딩 1회성 용도일 뿐, 실시간 프록시로는 절대 쓰지 않는다(이유는 docs/ERD.md "도서 카탈로그 모듈" 참고).
# 기본은 꺼둬서 일반 로컬 실행/테스트가 실제 API를 호출하지 않게 하고,
# docker-compose에서 APP_BOOK_SEED_ENABLED로 명시적으로 켜고 APP_KAKAO_REST_API_KEY로 실제 키를 공급한다.
# 키가 없거나 유효하지 않으면 시딩만 우아하게 실패할 뿐 기동 자체는 계속된다.
app.kakao.rest-api-key=
app.book-seed.enabled=false

# 오브젝트 스토리지(SeaweedFS, S3 호환) - 포토 리뷰 이미지 업로드 presigned URL 발급용(docker-compose에서는 APP_STORAGE_* 환경변수로 덮어씀).
# endpoint(app -> 스토리지 서버 대 서버 호출용)와 public-endpoint(presigned URL에 실제로 박혀서 클라이언트가 접근할 주소)를 분리하는 이유는
# S3StorageConfig 주석 참고 - 로컬에서 IDE로 직접 실행할 땐 컨테이너 간 통신이 없어 둘 다 localhost로 동일하다.
# 참고) S3Client/S3Presigner는 JavaMailSender와 마찬가지로 빈 생성 시점에 실제 연결을 시도하지 않아 NATS처럼 별도 온오프(enabled) 플래그가 필요 없다.
app.storage.endpoint=http://localhost:9000
app.storage.public-endpoint=http://localhost:9000
app.storage.access-key=bookstore-local-dev-access-key
app.storage.secret-key=bookstore-local-dev-secret-key-not-for-prod
app.storage.bucket=review-images
app.storage.presigned-url-expiration-seconds=300

# 고아 리뷰 이미지(presigned URL 업로드는 성공했지만 리뷰 생성에 실패해 어떤 Review에도 안 연결된 오브젝트)
# 정리 스케줄러 - 기본은 꺼둬서(app.nats.enabled와 동일 패턴) SeaweedFS 없는 로컬 실행/테스트에 영향 없게 하고,
# docker-compose에서만 켠다. 자세한 이유는 OrphanedReviewImageCleanupJob 주석 참고.
app.storage.orphan-cleanup.enabled=false
app.storage.orphan-cleanup.fixed-delay-ms=3600000
app.storage.orphan-cleanup.min-age-minutes=60
