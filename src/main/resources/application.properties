spring.application.name=bookstore
server.port=8080

# 데이터소스 - 로컬 개발 기본값(docker-compose에서는 SPRING_DATASOURCE_* 환경변수로 덮어씀)
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore
spring.datasource.username=bookstore
spring.datasource.password=bookstore

# JPA / Hibernate - 스키마는 Flyway가 소유하고, Hibernate는 검증만 할 뿐 DDL을 자동 생성하지 않는다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway - 위 spring.datasource.* 설정을 그대로 사용
spring.flyway.enabled=true

# Redis - 로컬 개발 기본값(docker-compose에서는 SPRING_DATA_REDIS_* 환경변수로 덮어씀)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# NATS - Spring Boot 자동설정이 없는 커스텀 클라이언트라 직접 정의한 프로퍼티.
# 기본은 꺼둬서(false)(app.book-seed.enabled와 동일한 패턴) NATS 서버가 없는 일반 로컬 실행/테스트는 기동 시 연결을 시도하지 않는다.
# docker-compose와 NATS 관련 테스트에서만 명시적으로 켠다.
#
# 참고: @ConditionalOnProperty는 기본값이 matchIfMissing=false라 이 줄 자체를 생략해도 동작(꺼짐)은 동일하다.
# 그런데도 명시해두는 이유는 순전히 가시성(discoverability) 때문 - 이 플래그가 존재하고 기본이 꺼져 있다는 걸
# 파일만 보고도 알 수 있게 하기 위함(바로 아래 app.book-seed.enabled와 같은 이유).
app.nats.enabled=false
app.nats.url=nats://localhost:4222

# JWT - 누가 봐도 가짜인 플레이스홀더라 커밋해도 안전하다. 실제 환경(docker-compose, CI, 운영)은 반드시
# APP_JWT_SECRET 환경변수로 덮어써야 한다(.env.example 참고) - 진짜 키는 절대 여기에 커밋하면 안 된다.
app.jwt.secret=bG9jYWwtZGV2LXBsYWNlaG9sZGVyLWRvLW5vdC11c2UtaW4tcHJvZHVjdGlvbiEh
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=1209600000

# Actuator - health만 노출하고, 컴포넌트 상세 정보는 절대 외부에 노출하지 않는다.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# 카카오 도서 검색 API - 카탈로그 시딩 1회성 용도일 뿐, 실시간 프록시로는 절대 쓰지 않는다(이유는 docs/ERD.md "도서 카탈로그 모듈" 참고).
# 기본은 꺼둬서 일반 로컬 실행/테스트가 실제 API를 호출하지 않게 하고,
# docker-compose에서 APP_BOOK_SEED_ENABLED로 명시적으로 켜고 APP_KAKAO_REST_API_KEY로 실제 키를 공급한다.
# 키가 없거나 유효하지 않으면 시딩만 우아하게 실패할 뿐 기동 자체는 계속된다.
app.kakao.rest-api-key=
app.book-seed.enabled=false
