# IDE에서 앱을 직접 실행(bootRun이 아닌 IDE Run/Debug Configuration)하면서 docker-compose 인프라
# (postgres/redis/nats/mailpit)만 띄워둔 상태로 NATS 발행/구독 흐름까지 테스트하고 싶을 때 쓰는 프로필.
# Run/Debug Configuration의 Active profiles에 local을 추가하면 적용된다. 자세한 이유는 docs/NATS.md 참고.
app.nats.enabled=true
app.nats.url=nats://localhost:4222
